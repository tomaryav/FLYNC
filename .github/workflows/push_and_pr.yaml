name: Workflow Push and Pull Request

on:
  push:
    branches:
    - main
    - release-*
  pull_request:
    branches:
    - main
    - release-*

permissions:
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run black
        uses: psf/black@26.5.1
        with:
          options: "--check --verbose --line-length 149 --diff"
          src: "./src"

  isort:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare
        run: |
          pip install --upgrade pip
          pip install "poetry>=2.0.0,<3.0.0" "poetry-dynamic-versioning>=1.0.0,<2.0.0"
          poetry install --no-root --only static-analysis

      - name: Run isort
        run: |
          mkdir format-reports
          poetry run isort --check --diff --color --line-length 149 src > format-reports/isort-report.diff

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: isort-artifacts
          path: format-reports

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare
        run: |
          pip install --upgrade pip
          pip install "poetry>=2.0.0,<3.0.0" "poetry-dynamic-versioning>=1.0.0,<2.0.0"
          poetry install --no-root --only static-analysis

      - name: Run flake8
        run: |
          poetry run flake8 --max-line-length 149 src
          poetry run flake8 --max-line-length 149 src --format=html --htmldir=flake8-report

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lint-artifacts
          path: flake8-report

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare
        run: |
          pip install --upgrade pip
          pip install "poetry>=2.0.0,<3.0.0" "poetry-dynamic-versioning>=1.0.0,<2.0.0"
          poetry install --with static-analysis
          mkdir type-check-reports

      - name: Run mypy
        run: |
          set -o pipefail
          poetry run mypy src --show-error-codes --pretty --install-types --non-interactive | tee type-check-reports/mypy-report.txt

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: type-check-artifacts
          path: type-check-reports

  pytest:
    runs-on: ubuntu-latest
    needs: [format-check, lint, type-check, isort]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare
        run: |
          pip install --upgrade pip
          pip install "poetry>=2.0.0,<3.0.0" "poetry-dynamic-versioning>=1.0.0,<2.0.0"
          poetry install --with test

      - name: Run Pytest
        run: |
          poetry install --with test
          poetry run pytest
          poetry run coverage xml
          poetry run coverage report

      - name: Coverage comment
        id: coverage_comment
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Store Pull Request comment to be posted
        uses: actions/upload-artifact@v7
        if: steps.coverage_comment.outputs.comment_file_written == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pytest-artifacts
          path: |
            .coverage
            report.xml
            coverage.xml
            tests/unit_test/sdk/fuzzed
            tests/unit_test/sdk/generated

  example-validation:
    runs-on: ubuntu-latest
    needs: [format-check, lint, type-check, isort]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare
        run: |
          pip install --upgrade pip
          pip install "poetry>=2.0.0,<3.0.0" "poetry-dynamic-versioning>=1.0.0,<2.0.0"
          poetry install

      - name: Run validate_examples.py
        run: |
          poetry run python src/flync/sdk/helpers/validate_examples.py

  build-documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare
        run: |
          pip install --upgrade pip
          pip install "poetry>=2.0.0,<3.0.0" "poetry-dynamic-versioning>=1.0.0,<2.0.0"
          cd docs
          pwd
          poetry install --with docs

      - name: Run make html
        run: |
          cd docs
          pwd
          make html

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: documentation-artifacts
          path: docs/build/
